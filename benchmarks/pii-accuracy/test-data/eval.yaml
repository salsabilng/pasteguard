cases:
  - id: eval_de_mixed_contact
    suite: eval
    category: eval
    split: test
    language: de
    text: "Maria Keller aus Berlin ist unter maria.keller@example.de erreichbar."
    expected:
      - entity: PERSON
        text: Maria Keller
        match: contains
      - entity: LOCATION
        text: Berlin
        match: contains
      - entity: EMAIL_ADDRESS
        text: maria.keller@example.de
        match: exact

