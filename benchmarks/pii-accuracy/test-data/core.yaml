cases:
  - id: core_email_en
    suite: core
    category: core
    split: test
    language: en
    text: "Email Alice at alice.smith@example.com before noon."
    expected:
      - entity: EMAIL_ADDRESS
        text: alice.smith@example.com
        match: exact

