name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Benchmark type check
        run: bun run typecheck:benchmarks

      - name: Lint & format check
        run: bun run check

      - name: Run tests
        run: bun test

  detector:
    name: Detector Lint, Types & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detector
        working-directory: detector
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          # CPU-only torch so the gliner dependency does not pull the CUDA build.
          .venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
          .venv/bin/pip install -e ".[dev]"

      - name: Lint
        working-directory: detector
        run: .venv/bin/ruff check .

      - name: Format check
        working-directory: detector
        run: .venv/bin/ruff format . --check

      - name: Type check
        working-directory: detector
        run: .venv/bin/pyright

      - name: Run tests
        working-directory: detector
        run: .venv/bin/python -m pytest -q

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build the all-in-one image users actually run (proxy + detector).
      - name: Test Docker build
        run: docker build -f docker/Dockerfile -t pasteguard:test .
